name: Weekly Model Retrain

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  retrain:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run retrain
        run: |
          python3 -c "
          import os, sys
          sys.path.insert(0, '.')
          from storage.database import Database
          from agents.ml_analysis.model_registry import ModelRegistry
          from agents.postmortem.retrain_pipeline import run_retrain
          db = Database(os.environ.get('DB_PATH', 'data/trading.db'))
          registry = ModelRegistry()
          run_retrain(db=db, registry=registry, model_type='stock')
          print('Done.')
          "
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: ${{ github.workspace }}/data/trading.db
