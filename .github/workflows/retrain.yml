name: Weekly Model Retrain

on:
  schedule:
    - cron: "0 2 * * 0"    # Sunday 02:00 UTC
  workflow_dispatch:

jobs:
  retrain:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run retrain
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          from storage.database import Database
          from agents.ml_analysis.model_registry import ModelRegistry
          from agents.postmortem.retrain_pipeline import run_retrain

          db = Database(os.environ.get('DB_PATH', 'data/trading.db'))
          registry = ModelRegistry()
          for model_type in ['stock']:
              print(f'Retraining {model_type} model...')
              run_retrain(db=db, registry=registry, model_type=model_type)
          print('Done.')
          "
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: ${{ github.workspace }}/data/trading.db
