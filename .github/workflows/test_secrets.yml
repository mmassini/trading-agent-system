name: Test Secrets

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test Anthropic API key
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d '{"model":"claude-haiku-4-5-20251001","max_tokens":10,"messages":[{"role":"user","content":"hi"}]}' \
            https://api.anthropic.com/v1/messages)
          echo "Anthropic API status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ ANTHROPIC_API_KEY: OK" || echo "❌ ANTHROPIC_API_KEY: FAILED (status $STATUS)"

      - name: Test Alpaca API key
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "APCA-API-KEY-ID: ${{ secrets.ALPACA_API_KEY }}" \
            -H "APCA-API-SECRET-KEY: ${{ secrets.ALPACA_SECRET_KEY }}" \
            https://paper-api.alpaca.markets/v2/account)
          echo "Alpaca API status: $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ ALPACA keys: OK" || echo "❌ ALPACA keys: FAILED (status $STATUS)"
