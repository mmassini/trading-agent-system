name: 12-Hour Report

on:
  schedule:
    - cron: "0 6 * * *"    # 06:00 UTC
    - cron: "0 18 * * *"   # 18:00 UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send Telegram report
        run: python -m agents.reporting.reporting_agent --mode=send
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DB_PATH: ${{ github.workspace }}/data/trading.db
